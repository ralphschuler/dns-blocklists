name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly release every Monday at 6 AM UTC
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Auto-generate version for scheduled releases
            VERSION="v$(date +%Y.%m.%d)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Get previous release tag
        id: previous
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Generate changelog
        id: changelog
        run: |
          python scripts/generate-changelog.py \
            --since "${{ steps.previous.outputs.tag }}" \
            --output changelog.md
          
          echo "## Changelog" >> $GITHUB_STEP_SUMMARY
          cat changelog.md >> $GITHUB_STEP_SUMMARY

      - name: Build all lists
        run: python build.py --validate

      - name: Generate statistics
        run: |
          python build.py stats > release-stats.txt
          echo "" >> changelog.md
          echo "## Statistics" >> changelog.md
          cat release-stats.txt >> changelog.md

      - name: Add GitHub Pages paths
        env:
          DOMAIN: https://${{ github.repository_owner }}.github.io
          REPO: ${{ github.event.repository.name }}
        run: |
          PATH_SUFFIX="/$REPO/"
          BASE_URL="$DOMAIN$PATH_SUFFIX"

          {
            echo ""
            echo "## GitHub Pages"
            echo "- Domain: $DOMAIN"
            echo "- Path: $PATH_SUFFIX"
            echo "- Base URL: $BASE_URL"
          } >> changelog.md

          {
            echo "## Release URLs"
            echo "Domain: $DOMAIN"
            echo "Path: $PATH_SUFFIX"
            echo "Base URL: $BASE_URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
